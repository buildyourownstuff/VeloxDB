name: Publish Docker Image
run-name: Publish Docker image ${{ inputs.image_tag }} from ${{ inputs.ref }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish, for example 0.1.0 or latest"
        required: true
        default: "latest"
        type: string
      ref:
        description: "Git ref to build, for example main or v0.1.0"
        required: true
        default: "main"
        type: string
      publish_latest:
        description: "Also publish ghcr.io/buildyourownstuff/veloxdb:latest"
        required: true
        default: false
        type: boolean
      platforms:
        description: "Comma-separated Docker platforms"
        required: true
        default: "linux/amd64,linux/arm64"
        type: string
      velox_cli_ref:
        description: "velox-cli git ref to include in the image"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-publish-${{ inputs.image_tag }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and publish
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Validate package inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SOURCE_REF: ${{ inputs.ref }}
          VELOX_CLI_REF: ${{ inputs.velox_cli_ref }}
        run: |
          set -euo pipefail
          if [[ ! "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image tag: $IMAGE_TAG" >&2
            exit 1
          fi
          if [[ ! "$SOURCE_REF" =~ ^[A-Za-z0-9_./-]+$ ]]; then
            echo "Invalid source ref: $SOURCE_REF" >&2
            exit 1
          fi
          if [[ ! "$VELOX_CLI_REF" =~ ^[A-Za-z0-9_./-]+$ ]]; then
            echo "Invalid velox-cli ref: $VELOX_CLI_REF" >&2
            exit 1
          fi

      - name: Checkout package source ref
        env:
          SOURCE_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$SOURCE_REF" >/dev/null 2>&1; then
            git fetch --depth=1 origin "refs/heads/${SOURCE_REF}"
            git checkout --detach FETCH_HEAD
          elif git ls-remote --exit-code --tags origin "$SOURCE_REF" >/dev/null 2>&1; then
            git fetch --depth=1 origin "refs/tags/${SOURCE_REF}"
            git checkout --detach FETCH_HEAD
          else
            echo "Package source ref '$SOURCE_REF' was not found on origin." >&2
            echo "For a release package, create and push the tag first, for example:" >&2
            echo "  make github-release VERSION=0.1.0" >&2
            echo "Or publish from main explicitly:" >&2
            echo "  make package-release PACKAGE_TAG=0.1.0 PACKAGE_REF=main" >&2
            exit 1
          fi
          echo "SOURCE_REVISION=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "SOURCE_REVISION_SHORT=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"

      - name: Validate velox-cli repository token
        env:
          VELOX_CLI_REPO_TOKEN: ${{ secrets.VELOX_CLI_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$VELOX_CLI_REPO_TOKEN" ]]; then
            echo "VELOX_CLI_REPO_TOKEN is required to package velox-cli from the private repository." >&2
            echo "Create a fine-grained token with read-only Contents access to buildyourownstuff/velox-cli." >&2
            exit 1
          fi

      - name: Checkout velox-cli
        uses: actions/checkout@v4
        with:
          repository: buildyourownstuff/velox-cli
          ref: ${{ inputs.velox_cli_ref }}
          path: .docker-context/velox-cli
          token: ${{ secrets.VELOX_CLI_REPO_TOKEN }}

      - name: Resolve velox-cli revision
        working-directory: .docker-context/velox-cli
        run: |
          set -euo pipefail
          echo "VELOX_CLI_REVISION=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "VELOX_CLI_REVISION_SHORT=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail
          tags="${IMAGE_NAME}:${IMAGE_TAG}"
          if [[ "$IMAGE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${IMAGE_TAG%.*}"
          fi
          if [[ "$PUBLISH_LATEST" == "true" ]]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi
          tags="${tags}"$'\n'"${IMAGE_NAME}:sha-${SOURCE_REVISION_SHORT}"
          {
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime-with-cli
          platforms: ${{ inputs.platforms }}
          push: true
          build-contexts: |
            velox_cli=.docker-context/velox-cli
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=VeloxDB
            org.opencontainers.image.description=Redis-inspired in-memory key-value database
            org.opencontainers.image.vendor=buildyourownstuff
            org.opencontainers.image.version=${{ inputs.image_tag }}
            org.opencontainers.image.revision=${{ env.SOURCE_REVISION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.veloxdb.cli.source=${{ github.server_url }}/buildyourownstuff/velox-cli
            org.opencontainers.image.veloxdb.cli.ref=${{ inputs.velox_cli_ref }}
            org.opencontainers.image.veloxdb.cli.revision=${{ env.VELOX_CLI_REVISION }}
          build-args: |
            VERSION=${{ inputs.image_tag }}
            REVISION=${{ env.SOURCE_REVISION }}
            SOURCE=${{ github.server_url }}/${{ github.repository }}
            VELOX_CLI_REF=${{ inputs.velox_cli_ref }}
            VELOX_CLI_REVISION=${{ env.VELOX_CLI_REVISION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
