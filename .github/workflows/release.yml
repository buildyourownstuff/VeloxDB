name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  stable:
    name: Create stable GitHub release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, for example v0.1.0" >&2
            exit 1
          fi
          version="${tag#v}"
          cmake_version="$(sed -nE 's/project\(VeloxDB VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)"
          if [[ "$version" != "$cmake_version" ]]; then
            echo "Tag $tag does not match CMake project version $cmake_version" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build source archives
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="veloxdb-${TAG#v}/" "$TAG" > "dist/veloxdb-${TAG#v}.tar.gz"
          git archive --format=zip --prefix="veloxdb-${TAG#v}/" "$TAG" > "dist/veloxdb-${TAG#v}.zip"
          (cd dist && sha256sum "veloxdb-${TAG#v}.tar.gz" "veloxdb-${TAG#v}.zip" > SHA256SUMS)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          notes="$(cat docs/release-notes-template.md)"
          gh release create "$TAG" \
            --title "VeloxDB $TAG" \
            --notes "$notes" \
            --generate-notes \
            --verify-tag \
            dist/*

  continuous:
    name: Publish continuous main release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        run: |
          set -euo pipefail
          version="$(sed -nE 's/project\(VeloxDB VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "tag=continuous-main" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Move continuous tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"

      - name: Build source archives
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHORT_SHA: ${{ steps.release.outputs.short_sha }}
        run: |
          set -euo pipefail
          mkdir -p dist release-notes
          prefix="veloxdb-${VERSION}-main-${SHORT_SHA}"
          git archive --format=tar.gz --prefix="${prefix}/" HEAD > "dist/${prefix}.tar.gz"
          git archive --format=zip --prefix="${prefix}/" HEAD > "dist/${prefix}.zip"
          (cd dist && sha256sum "${prefix}.tar.gz" "${prefix}.zip" > SHA256SUMS)
          cat > release-notes/continuous-main.md <<EOF
          Continuous release from \`main\`.

          - Version: \`${VERSION}\`
          - Commit: \`${GITHUB_SHA}\`
          - Source branch: \`main\`

          This prerelease is updated on every push to \`main\`. Stable releases use tags like \`v0.1.0\`.
          EOF

      - name: Create or update continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          title="VeloxDB Continuous (main)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$title" \
              --notes-file release-notes/continuous-main.md \
              --prerelease
          else
            gh release create "$TAG" \
              --title "$title" \
              --notes-file release-notes/continuous-main.md \
              --prerelease \
              --latest=false \
              --verify-tag
          fi
          gh release upload "$TAG" dist/* --clobber
