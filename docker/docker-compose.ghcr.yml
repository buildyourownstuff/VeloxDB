services:
  veloxdb:
    image: ghcr.io/buildyourownstuff/veloxdb:latest
    ports:
      - "7379:7379"
    volumes:
      - veloxdb-data:/data
    environment:
      VELOXDB_AOF_ENABLED: "true"
      VELOXDB_AOF_PATH: "/data/veloxdb.aof"
      VELOXDB_SNAPSHOT_PATH: "/data/veloxdb.snapshot"
      VELOXDB_MANIFEST_PATH: "/data/veloxdb.manifest"

volumes:
  veloxdb-data:
