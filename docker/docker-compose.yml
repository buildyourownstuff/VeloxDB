services:
  veloxdb:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: veloxdb:dev
    ports:
      - "7379:7379"
    volumes:
      - veloxdb-data:/data
    environment:
      VELOXDB_AOF_ENABLED: "true"
      VELOXDB_AOF_PATH: "/data/veloxdb.aof"

volumes:
  veloxdb-data:
